<!DOCTYPE html><html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur d'Épreuve — Universel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
:root{--primary:#0a2463;--primary-light:#1e3a8a;--primary-mid:#3b82f6;--primary-surface:#eef2ff;--accent:#f59e0b;--success:#10b981;--danger:#ef4444;--orange:#f97316;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-300:#cbd5e1;--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;--gray-700:#334155;--gray-800:#1e293b;--radius:12px;--radius-sm:8px;--radius-xs:6px;--shadow:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 6px -1px rgba(0,0,0,.07);--shadow-xl:0 20px 25px -5px rgba(0,0,0,.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--gray-100);color:var(--gray-800);line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px}
.app-layout{display:flex;min-height:100vh}
.sidebar{width:500px;min-width:500px;background:white;border-right:1px solid var(--gray-200);overflow-y:auto;height:100vh;position:sticky;top:0;z-index:50}
.sidebar-inner{padding:12px 10px}
.sidebar-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--gray-100)}
.sidebar-header .logo{width:30px;height:30px;background:var(--primary);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:white;font-size:.9rem;font-weight:700}
.sidebar-header h2{font-size:.82rem;font-weight:700;color:var(--gray-800)}.sidebar-header .badge{font-size:.55rem;background:#fef3c7;color:#92400e;padding:1px 5px;border-radius:20px;font-weight:600;margin-left:auto}
.form-cat{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-400);margin:8px 0 2px 0;display:flex;align-items:center;gap:4px}.form-cat .act{font-size:.65rem;text-transform:none;color:var(--primary-mid);cursor:pointer;font-weight:600;margin-left:auto}
.form-row{display:flex;gap:4px}.form-row>*{flex:1}
.form-g{margin-bottom:2px}.form-g label{display:block;font-size:.62rem;font-weight:600;color:var(--gray-600);margin-bottom:1px}
.form-g input,.form-g textarea,.form-g select{width:100%;padding:3px 6px;border:1.5px solid var(--gray-200);border-radius:var(--radius-xs);font-size:.7rem;font-family:inherit;transition:all .2s;background:var(--gray-50);color:var(--gray-800)}
.form-g input:focus,.form-g textarea:focus,.form-g select:focus{border-color:var(--primary-mid);outline:none;box-shadow:0 0 0 3px rgba(59,130,246,.12);background:white}
.form-g textarea{min-height:24px;resize:vertical}
.form-g select{cursor:pointer}
.sidebar-actions{margin-top:6px;display:flex;flex-direction:column;gap:3px}
.btn{padding:5px 9px;border:none;border-radius:var(--radius-sm);font-weight:600;font-size:.72rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px;font-family:inherit}
.btn:active{transform:scale(.97)}.btn-primary{background:var(--primary);color:white}.btn-primary:hover{background:var(--primary-light);box-shadow:var(--shadow-md)}.btn-success{background:var(--success);color:white}.btn-success:hover{background:#059669}.btn-orange{background:var(--orange);color:white}.btn-orange:hover{background:#ea580c}.btn-outline{background:transparent;color:var(--gray-600);border:1.5px solid var(--gray-200)}.btn-outline:hover{background:var(--gray-50)}.btn-sm{padding:2px 6px;font-size:.67rem}.btn-xs{padding:1px 5px;font-size:.62rem;border-radius:4px;background:var(--danger);color:white;border:none;cursor:pointer}.btn-xs:hover{background:#dc2626}
.main-content{flex:1;padding:14px 20px;display:flex;justify-content:center}.page-container{max-width:1050px;width:100%}
.page{background:white;border-radius:var(--radius);box-shadow:var(--shadow-xl);overflow:hidden}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.empty-state .icon{font-size:2.5rem;margin-bottom:8px;opacity:.4}.empty-state h3{font-size:.95rem;color:var(--gray-400);font-weight:600}
/* Exam header */
.exam-header{background:white;padding:12px 16px 6px 16px;font-size:.73rem;color:var(--gray-600)}
.exam-header table{width:100%;border-collapse:collapse;margin-bottom:8px;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.exam-header td,.exam-header th{border:1px solid var(--gray-200);padding:6px 10px;text-align:center;font-size:.71rem;font-weight:500;vertical-align:middle}
.exam-header th{background:var(--primary-surface);font-weight:700;color:var(--primary)}
/* Exercise cards */
.exo-card{background:white;border:1px solid var(--gray-200);border-radius:var(--radius-xs);margin-bottom:3px;overflow:hidden}
.exo-hdr{display:flex;align-items:center;gap:3px;padding:3px 5px;background:var(--gray-50);font-size:.65rem;font-weight:600;color:var(--gray-600);cursor:pointer;user-select:none}
.exo-hdr .num{color:var(--primary-mid);font-weight:700;font-size:.68rem}
.exo-hdr .type-badge{font-size:.58rem;background:var(--primary-surface);color:var(--primary);padding:0 4px;border-radius:3px;margin-left:auto;font-weight:600}
.exo-hdr .del-exo{background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:.7rem;padding:0 2px;line-height:1}.exo-hdr .del-exo:hover{color:var(--danger)}
.exo-body{padding:3px 5px;display:none;border-top:1px solid var(--gray-100)}
.exo-card.open .exo-body{display:block}
.exo-body .form-g textarea{font-size:.68rem}
/* Preview exercises */
.exercise{margin:0 0 10px 0}.exercise:last-child{margin-bottom:0}
.exercise-inner{padding:12px 16px;border-left:4px solid var(--primary-mid);background:white;border-radius:0 8px 8px 0;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.exercise-title{font-size:.88rem;font-weight:700;color:var(--gray-800);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.exercise-title .exo-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:var(--primary);color:white;border-radius:5px;font-size:.68rem;font-weight:700;flex-shrink:0}
.exercise-text{font-size:.76rem;color:var(--gray-700);margin-bottom:5px;line-height:1.65}
.exercise ol{padding-left:20px;font-size:.75rem;color:var(--gray-700)}
.exercise ol li{margin-bottom:3px;line-height:1.6}.exercise .pts{display:inline-block;font-size:.64rem;color:var(--gray-500);font-weight:600;background:var(--gray-50);padding:0 6px;border-radius:4px;margin-left:4px;line-height:1.5}
.vf-table{border-collapse:collapse;width:100%;margin:4px 0;font-size:.73rem}
.vf-table td{padding:2px 6px;border:1px solid var(--gray-200);vertical-align:middle}
.vf-table td:first-child{width:70%}.vf-table td:last-child{width:30%;text-align:center}
.match-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:4px;margin:4px 0;align-items:center}
.match-col{font-size:.73rem}.match-col td{padding:2px 6px;border:1px solid var(--gray-200);text-align:center}
.qcm-item{margin:3px 0;font-size:.74rem}.qcm-item .q{font-weight:600;color:var(--gray-700)}.qcm-item .opts{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:1px;padding-left:10px}
.qcm-item .opts span{padding:1px 4px;border-radius:3px;font-size:.72rem}.qcm-item .opts .cor{background:#d1fae5;color:#065f46;font-weight:600}
.ans-mark{display:inline}.no-answers .ans-mark{display:none}.no-answers .cor{background:transparent!important;color:inherit!important;font-weight:400}
.trous-text{font-size:.76rem;color:var(--gray-700);line-height:1.7;padding:4px 6px;background:var(--gray-50);border-radius:var(--radius-xs);border:1px dashed var(--gray-300)}
.trous-text .blank{display:inline-block;min-width:50px;border-bottom:2px solid var(--gray-400);margin:0 2px;color:var(--gray-400);font-style:italic}
.exercise-img{max-width:60%;max-height:160px;display:block;margin:4px auto;border-radius:var(--radius-xs);border:1px solid var(--gray-200)}
.exercise-solution{margin-top:8px;padding:8px 10px;background:#fffbeb;border:1px dashed #f59e0b;border-radius:var(--radius-xs);font-size:.74rem;color:var(--gray-700);line-height:1.55}
.exercise-solution strong{color:#92400e;font-size:.68rem;text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:2px}
.exam-logo{max-height:60px;max-width:180px;display:block;margin:0 auto 4px auto}
.data-table{border-collapse:collapse;margin:4px auto;font-size:.73rem}
.data-table td,.data-table th{border:1px solid var(--gray-300);padding:3px 10px;text-align:center}
.data-table th{background:var(--gray-50);font-weight:600;color:var(--gray-600)}
.footer{display:flex;justify-content:center;align-items:center;flex-wrap:wrap;padding:10px 16px;font-size:.73rem;color:var(--gray-500);border-top:1px solid var(--gray-200);background:var(--gray-50)}
.footer .sep{color:var(--gray-300);margin:0 5px}
.toast{position:fixed;bottom:16px;right:16px;background:var(--gray-900);color:white;padding:6px 14px;border-radius:var(--radius-sm);font-size:.72rem;font-weight:500;z-index:999;opacity:0;transform:translateY(20px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
@media print{.sidebar{display:none!important}.main-content{padding:0!important}.page{box-shadow:none!important;border-radius:0}.exam-header table{box-shadow:none!important}.exercise-inner{box-shadow:none!important;border-radius:0}body{background:white}.toast{display:none!important}}
@media(max-width:1000px){.app-layout{flex-direction:column}.sidebar{width:100%;min-width:100%;height:auto;position:static}.main-content{padding:8px}}
</style>
</head><body>
<div class="toast" id="toast"></div>
<div class="app-layout">
<div class="sidebar">
<div class="sidebar-inner">
<div class="sidebar-header"><div class="logo">📝</div><div><h2>Générateur d'Épreuve</h2></div><span class="badge">v2.0</span></div>

<!-- EN-TÊTE -->
<div class="form-cat">① En-tête</div>
<div class="form-row"><div class="form-g"><label>Direction Régionale</label><input type="text" id="f_direction" value="KARA"></div><div class="form-g"><label>CEG / Établissement</label><input type="text" id="f_ceg" value="MASSEDENA"></div></div>
<div class="form-row"><div class="form-g"><label>Titre épreuve</label><input type="text" id="f_titre" value="DEVOIR DE MATHÉMATIQUES"></div><div class="form-g"><label>Période</label><input type="text" id="f_periode" value="3ème TRIMESTRE"></div></div>
<div class="form-row"><div class="form-g"><label>Matière</label><input type="text" id="f_matiere" value="Mathématiques"></div><div class="form-g"><label>Classe</label><input type="text" id="f_classe" value="Sixième"></div></div>
<div class="form-g"><label>Logo (JPEG/PNG)</label><input type="file" accept="image/jpeg,image/png" id="f_logo" onchange="handleLogo(this)"></div>
<div class="form-row"><div class="form-g"><label>Durée</label><input type="text" id="f_duree" value="2 heures"></div><div class="form-g"><label>Enseignant</label><input type="text" id="f_enseignant" value="M. KOLA"></div></div>
<div class="form-row"><div class="form-g"><label>Établissement (pied)</label><input type="text" id="f_etab" value="IESG-Niamtougou"></div><div class="form-g"><label>Sigle matière (pied)</label><input type="text" id="f_sigle" value="MATHS-PCT"></div></div>

<!-- EXERCICES -->
<div class="form-cat">② Exercices <span class="act" onclick="ajouterExo()">+ Ajouter un exercice</span></div>
<div id="exosContainer"></div>

<!-- ACTIONS -->
<div class="sidebar-actions">
<button class="btn btn-primary" onclick="generer()">⚡ GÉNÉRER L'ÉPREUVE</button>
<div style="display:flex;gap:3px">
<button class="btn btn-success" onclick="imprimer()" style="flex:1">🖨 Imprimer</button>
<button class="btn btn-orange" onclick="exporterLatex()" style="flex:1">📄 LaTeX</button>
</div>
<div style="display:flex;gap:3px">
<button class="btn btn-outline btn-sm" onclick="exporterHTML()" style="flex:1">💾 HTML</button>
<button class="btn btn-outline btn-sm" onclick="if(confirm('Réinitialiser tous les champs ?')){resetTout()}" style="flex:1">↺ Reset</button>
</div>
<div class="form-g" style="margin-top:1px"><label style="display:flex;align-items:center;gap:4px;font-size:.68rem;color:var(--gray-500);cursor:pointer"><input type="checkbox" id="chk_hide_answers" onchange="toggleAnswers(this.checked)"> Masquer les réponses (QCM)</label></div>
<div class="form-g"><label style="display:flex;align-items:center;gap:4px;font-size:.68rem;color:var(--gray-500);cursor:pointer"><input type="checkbox" id="chk_show_solutions" onchange="toggleSolutions(this.checked)"> Afficher les solutions</label></div>
</div>
</div></div>

<!-- ===== PREVIEW ===== -->
<div class="main-content">
<div class="page-container">
<div class="page" id="emptyState">
<div class="empty-state"><div class="icon">📝</div><h3>Configurez l'épreuve dans le panneau</h3><p style="color:var(--gray-400);font-size:.74rem">Remplissez l'en-tête et ajoutez des exercices, puis cliquez sur <strong>"Générer"</strong>.</p></div>
</div>
<div class="page" id="epreuvePage" style="display:none">
<!-- EN-TÊTE -->
<div class="exam-header"><img id="g_logo_img" class="exam-logo" style="display:none"><table><tr><th style="width:30%">Direction : <span id="g_direction">KARA</span></th><th style="width:40%"><span id="g_titre">DEVOIR</span></th><th style="width:30%">Classe : <span id="g_classe">Sixième</span></th></tr><tr><td><span id="g_ceg">CEG</span></td><td><span id="g_periode">Période</span></td><td>Durée : <span id="g_duree">2 h</span></td></tr></table></div>
<!-- EXERCICES PLACEHOLDER -->
<div id="g_exos"></div>
<!-- PIED -->
<div class="footer"><span id="g_teacher_footer"></span><span class="sep">|</span><span id="g_etab_footer"></span><span class="sep">|</span><span id="g_sigle_footer"></span><span class="sep">—</span><span id="g_bon">Bon courage !</span></div>
</div></div></div></div>

<script>
const $=id=>document.getElementById(id);
const v=id=>{const e=$(id);return e?e.value:'';};
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const nl2br=s=>esc(s).replace(/\n/g,'<br>');
const el=s=>String(s).replace(/&/g,'\\&').replace(/%/g,'\\%').replace(/\$/g,'\\$').replace(/#/g,'\\#').replace(/_/g,'\\_').replace(/\{/g,'\\{').replace(/\}/g,'\\}').replace(/~/g,'\\textasciitilde{}');

function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);}

// ─── EXERCISE TYPES ───
const TYPES=[
  {id:'situation',label:'Situation problème',icon:'🔍',fields:['enonce','questions']},
  {id:'traditionnel',label:'Questions traditionnelles',icon:'📝',fields:['questions']},
  {id:'vf',label:'Vrai ou Faux',icon:'✓✗',fields:['items']},
  {id:'qcm',label:'QCM (choix unique)',icon:'⭕',fields:['qcmItems']},
  {id:'appariement',label:'Association / Appariement',icon:'⇄',fields:['colG','colD']},
  {id:'trous',label:'Texte à trous',icon:'___',fields:['trousTexte']},
  {id:'ouverte',label:'Questions ouvertes',icon:'💬',fields:['questions']}
];

// ─── EXERCISE STATE ───
let exos=[];let nextId=0;
let logoData={data:'',name:''};
function handleLogo(input){
  const f=input.files[0];
  if(!f){logoData={data:'',name:''};generer();return;}
  const r=new FileReader();
  r.onload=()=>{logoData={data:r.result,name:f.name};generer();};
  r.readAsDataURL(f);
}

function exoType(id){const e=exos.find(x=>x.id===id);return e?e.type:'traditionnel';}

function ajouterExo(type){
  if(!type)type='traditionnel';
  exos.push({id:nextId++,title:'Exercice '+(exos.length+1),points:'',type:type,
    enonce:'',questions:'',items:'',qcmItems:'',colG:'',colD:'',trousTexte:'',img:'',imgName:'',solution:''});
  renderExos();toast('Exercice ajouté');
}
function supprimerExo(id){
  if(exos.length<=1){toast('Minimum 1 exercice');return;}
  exos=exos.filter(x=>x.id!==id);
  exos.forEach((e,i)=>{if(e.title===('Exercice '+(i+2))||/^Exercice \d+$/.test(e.title))e.title='Exercice '+(i+1);});
  renderExos();generer();
}
function moveExo(id,dir){
  const idx=exos.findIndex(x=>x.id===id);if(idx<0)return;const n=idx+dir;
  if(n<0||n>=exos.length)return;[exos[idx],exos[n]]=[exos[n],exos[idx]];
  renderExos();generer();
}
function setExoField(id,field,val){
  const e=exos.find(x=>x.id===id);if(e){e[field]=val;}
}
function setExoType(id,type){
  const e=exos.find(x=>x.id===id);if(!e)return;
  e.type=type;renderExos();generer();
}

function handleExoImg(id,input){
  const f=input.files[0];const e=exos.find(x=>x.id===id);if(!e)return;
  if(!f){e.img='';e.imgName='';generer();return;}
  const r=new FileReader();
  r.onload=()=>{e.img=r.result;e.imgName=f.name;generer();};
  r.readAsDataURL(f);
}
function renderExos(){
  let h='';
  exos.forEach((e,i)=>{
    const t=TYPES.find(x=>x.id===e.type)||TYPES[1];
    h+=`<div class="exo-card" id="exocard_${e.id}">
      <div class="exo-hdr" onclick="const c=this.parentElement;c.classList.toggle('open');if(c.classList.contains('open'))setTimeout(()=>c.querySelector('input,textarea')?.focus(),50)">
        <span style="cursor:move;font-size:.6rem;color:var(--gray-300)" onclick="event.stopPropagation()" onmousedown="event.stopPropagation()">⠿</span>
        <span class="num" id="exoNum_${e.id}">${i+1}.</span>
        <input type="text" value="${esc(e.title)}" style="border:none;background:transparent;font-size:.65rem;font-weight:600;color:var(--gray-700);width:auto;flex:1;min-width:60px" onchange="setExoField(${e.id},'title',this.value);generer()" onclick="event.stopPropagation()">
        <input type="text" value="${esc(e.points)}" placeholder="pts" style="width:40px;border:none;background:transparent;font-size:.6rem;color:var(--gray-400);text-align:right" onchange="setExoField(${e.id},'points',this.value);generer()" onclick="event.stopPropagation()">
        <span class="type-badge">${t.label}</span>
        <span style="display:flex;gap:1px">
          <button class="btn-xs" onclick="event.stopPropagation();moveExo(${e.id},-1)" title="Monter">&#9650;</button>
          <button class="btn-xs" onclick="event.stopPropagation();moveExo(${e.id},1)" title="Descendre">&#9660;</button>
        </span>
        <button class="del-exo" onclick="event.stopPropagation();supprimerExo(${e.id})">✕</button>
      </div>
      <div class="exo-body">
        <div class="form-row" style="gap:3px">
          <div class="form-g" style="flex:1"><label>Type</label><select onchange="setExoType(${e.id},this.value)" onclick="event.stopPropagation()">${TYPES.map(tx=>'<option value="'+tx.id+'"'+(e.type===tx.id?' selected':'')+'>'+tx.label+'</option>').join('')}</select></div>
        </div>`;
    // Type-specific fields
    if(t.fields.includes('enonce')){
      h+=`<div class="form-g"><label>Énoncé / Situation</label><textarea rows="2" onchange="setExoField(${e.id},'enonce',this.value);generer()" onclick="event.stopPropagation()">${esc(e.enonce)}</textarea></div>`;
    }
    if(t.fields.includes('questions')){
      h+=`<div class="form-g"><label>Questions (une par ligne, points après |)</label><textarea rows="2" onchange="setExoField(${e.id},'questions',this.value);generer()" onclick="event.stopPropagation()">${esc(e.questions)}</textarea></div>`;
    }
    if(t.fields.includes('items')){
      h+=`<div class="form-g"><label>Affirmations (une par ligne)</label><textarea rows="2" onchange="setExoField(${e.id},'items',this.value);generer()" onclick="event.stopPropagation()">${esc(e.items)}</textarea></div>`;
    }
    if(t.fields.includes('qcmItems')){
      h+=`<div class="form-g"><label>QCM (une par ligne : Question | Option A | Option B | *Option C | Option D)</label><textarea rows="2" onchange="setExoField(${e.id},'qcmItems',this.value);generer()" onclick="event.stopPropagation()">${esc(e.qcmItems)}</textarea></div>`;
    }
    if(t.fields.includes('colG')){
      h+=`<div class="form-row" style="gap:3px"><div class="form-g"><label>Colonne gauche</label><textarea rows="2" onchange="setExoField(${e.id},'colG',this.value);generer()" onclick="event.stopPropagation()">${esc(e.colG)}</textarea></div><div class="form-g"><label>Colonne droite</label><textarea rows="2" onchange="setExoField(${e.id},'colD',this.value);generer()" onclick="event.stopPropagation()">${esc(e.colD)}</textarea></div></div>`;
    }
    if(t.fields.includes('trousTexte')){
      h+=`<div class="form-g"><label>Texte à trous (utilisez [___] pour les blancs)</label><textarea rows="2" onchange="setExoField(${e.id},'trousTexte',this.value);generer()" onclick="event.stopPropagation()">${esc(e.trousTexte)}</textarea></div>`;
    }
    h+=`<div class="form-g"><label>Image associée (JPEG/PNG)</label><input type="file" accept="image/jpeg,image/png" onchange="handleExoImg(${e.id},this)" onclick="event.stopPropagation()"></div>`;
    h+=`<div class="form-g"><label>Solution / Correction</label><textarea rows="2" onchange="setExoField(${e.id},'solution',this.value);generer()" onclick="event.stopPropagation()">${esc(e.solution)}</textarea></div>`;
    h+=`</div></div>`;
  });
  $('exosContainer').innerHTML=h;
}

// ─── PREVIEW GENERATION ───
function generer(){
  $('g_direction').textContent=v('f_direction');
  $('g_ceg').textContent=v('f_ceg');
  $('g_titre').textContent=v('f_titre');
  $('g_periode').textContent=v('f_periode');
  $('g_classe').textContent=v('f_classe');
  $('g_duree').textContent=v('f_duree');
  $('g_teacher_footer').textContent=v('f_enseignant');
  $('g_etab_footer').textContent=v('f_etab');
  $('g_sigle_footer').textContent=v('f_sigle');
  const gi=$('g_logo_img');
  if(logoData.data){gi.src=logoData.data;gi.style.display='block';}
  else{gi.style.display='none';}
  let ehtml='';
  exos.forEach((e,i)=>{
    const t=TYPES.find(x=>x.id===e.type)||TYPES[1];
    ehtml+=`<div class="exercise"><div class="exercise-inner"><div class="exercise-title"><span class="exo-num">${i+1}</span>${esc(e.title||'Exercice '+(i+1))}${e.points?' <span class="pts">('+esc(e.points)+')</span>':''}</div>`;
    if(e.img)ehtml+=`<img src="${e.img}" class="exercise-img" alt="${esc(e.imgName||'')}">`;
    switch(e.type){
      case'situation':
        if(e.enonce)ehtml+=`<div class="exercise-text">${nl2br(e.enonce)}</div>`;
        ehtml+=makeOL(e.questions);break;
      case'traditionnel':case'ouverte':
        ehtml+=makeOL(e.questions);break;
      case'vf':
        ehtml+='<p style="font-size:.7rem;color:var(--gray-500);margin-bottom:2px">Complète par <b>vrai</b> ou <b>faux</b> :</p>'+makeVF(e.items);break;
      case'qcm':
        ehtml+=makeQCM(e.qcmItems);break;
      case'appariement':
        ehtml+=makeMatch(e.colG,e.colD);break;
      case'trous':
        ehtml+=makeTrous(e.trousTexte);break;
    }
    if(showSolutions&&e.solution)ehtml+=`<div class="exercise-solution"><strong>Solution :</strong> ${nl2br(e.solution)}</div>`;
    ehtml+='</div></div>';
  });
  $('g_exos').innerHTML=ehtml;
  $('emptyState').style.display='none';$('epreuvePage').style.display='block';
  toast('✅ Épreuve générée');
}

function makeOL(q){
  if(!q||!q.trim())return '';
  const items=q.split('\n').filter(s=>s.trim());
  if(!items.length)return '';
  let h='<ol>';items.forEach(i=>{const p=i.lastIndexOf('|');const txt=p>0?i.slice(0,p).trim():i.trim();const pts=p>0?i.slice(p+1).trim():'';h+=`<li>${esc(txt)}${pts?' <span class="pts">('+esc(pts)+')</span>':''}</li>`;});h+='</ol>';return h;
}
function makeVF(items){
  if(!items||!items.trim())return '';
  const it=items.split('\n').filter(s=>s.trim());if(!it.length)return '';
  let h='<table class="vf-table"><tr><th style="width:70%">Affirmation</th><th style="width:30%">Vrai / Faux</th></tr>';
  it.forEach(s=>{h+=`<tr><td>${esc(s)}</td><td style="text-align:center"><i>……</i></td></tr>`;});
  return h+'</table>';
}
function makeQCM(q){
  if(!q||!q.trim())return '';
  const lines=q.split('\n').filter(s=>s.trim());if(!lines.length)return '';
  let h='';
  lines.forEach(line=>{
    const parts=line.split('|').map(s=>s.trim());if(parts.length<2)return;
    const question=parts[0];const opts=parts.slice(1);
    h+=`<div class="qcm-item"><div class="q">${esc(question)}</div><div class="opts">`;
    opts.forEach(o=>{const cor=o.startsWith('*');h+=`<span${cor?' class="cor"':''}>${cor?esc(o.slice(1).trim()):esc(o)}${cor?' <span class="ans-mark">✓</span>':''}</span>`;});
    h+=`</div></div>`;
  });
  return h;
}
function makeMatch(g,d){
  if(!g||!g.trim())return'<p style="font-size:.72rem;color:var(--gray-400)">—</p>';
  const ga=g.split('\n').filter(s=>s.trim()),da=(d||'').split('\n').filter(s=>s.trim());
  let h='<div class="match-grid"><div class="match-col"><table style="width:100%;border-collapse:collapse">';
  ga.forEach(s=>{h+=`<tr><td style="border:1px solid var(--gray-200);padding:2px 6px;text-align:center">${esc(s)}</td></tr>`;});
  h+='</table></div><div style="font-size:1.2rem;color:var(--gray-300);text-align:center">⇄</div><div class="match-col"><table style="width:100%;border-collapse:collapse">';
  da.forEach(s=>{h+=`<tr><td style="border:1px solid var(--gray-200);padding:2px 6px;text-align:center">${esc(s)}</td></tr>`;});
  return h+'</table></div></div>';
}
function makeTrous(t){
  if(!t||!t.trim())return'';
  const r=t.replace(/\[___\]/g,'<span class="blank">……</span>').replace(/\[…\]/g,'<span class="blank">……</span>');
  return `<div class="trous-text">${nl2br(r)}</div>`;
}

function mkLatexOL(q){
  if(!q||!q.trim())return'';
  const items=q.split('\n').filter(s=>s.trim());if(!items.length)return'';
  let h='\\begin{enumerate}[itemsep=2pt,topsep=2pt,leftmargin=*]\n';
  items.forEach(i=>{const p=i.lastIndexOf('|');const txt=p>0?i.slice(0,p).trim():i.trim();const pts=p>0?i.slice(p+1).trim():'';h+='  \\item '+el(txt)+(pts?' \\hfill ('+el(pts)+')':'')+'\n';});
  return h+'\\end{enumerate}\n';
}
function mkLatexOL2(items,suffix){
  if(!items||!items.trim())return'';
  const it=items.split('\n').filter(s=>s.trim());if(!it.length)return'';
  let h='\\begin{enumerate}[itemsep=2pt,topsep=2pt,leftmargin=*]\n';
  it.forEach(i=>{h+='  \\item '+el(i)+' \\hfill ('+el(suffix)+')\n';});
  return h+'\\end{enumerate}\n';
}
function mkLatexQCM(q){
  if(!q||!q.trim())return'';
  const lines=q.split('\n').filter(s=>s.trim());if(!lines.length)return'';
  let h='\\begin{enumerate}[itemsep=4pt,topsep=2pt,leftmargin=*]\n';
  lines.forEach(line=>{
    const parts=line.split('|').map(s=>s.trim());if(parts.length<2)return;
    h+='  \\item '+el(parts[0])+' \\\\\n  \\begin{itemize}[itemsep=1pt]\n';
    parts.slice(1).forEach(o=>{const c=o.startsWith('*');h+='    \\item[\\fbox{'+(!c?'\\hspace*{3mm}':'\\checkmark')+'}] '+el(c?o.slice(1).trim():o)+'\n';});
    h+='  \\end{itemize}\n';
  });
  return h+'\\end{enumerate}\n';
}
function mkLatexMatch(g,d){
  if(!g||!g.trim())return'';
  const ga=g.split('\n').filter(s=>s.trim()),da=(d||'').split('\n').filter(s=>s.trim());
  let h='\\begin{center}\n\\begin{tabular}{|>{\\centering\\arraybackslash}p{0.3\\textwidth}|}\n\\hline\n';
  ga.forEach(s=>{h+='  '+el(s)+' \\\\ \\hline\n';});h+='\\end{tabular}\n\\hspace{1cm}\n\\begin{tabular}{|>{\\centering\\arraybackslash}p{0.3\\textwidth}|}\n\\hline\n';
  da.forEach(s=>{h+='  '+el(s)+' \\\\ \\hline\n';});
  return h+'\\end{tabular}\n\\end{center}\n';
}
